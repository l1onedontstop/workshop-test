<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- === BACKGROUND GRADIENTS === -->
    <!-- Dark metallic base -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="40%" stop-color="#18142a"/>
      <stop offset="100%" stop-color="#0f0b1a"/>
    </linearGradient>

    <!-- Subtle radial sheen for metallic depth -->
    <radialGradient id="bgShine" cx="0.45" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#2d2550" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#1a1530" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0f0b1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner border highlight -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3b7c" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#3b2f5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2d2250" stop-opacity="0.35"/>
    </linearGradient>

    <!-- === BRAND GRADIENTS === -->
    <!-- Primary diagonal gradient: violet → indigo -->
    <linearGradient id="brandGrad" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="20%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <!-- Horizontal variant for crossbars -->
    <linearGradient id="brandGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- === FILTERS === -->
    <!-- Mark glow for subtle bloom -->
    <filter id="markGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Large ambient glow behind the mark -->
    <filter id="ambientGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <!-- Main rounded square (macOS style) -->
  <rect x="52" y="52" width="920" height="920" rx="196" fill="url(#bgGrad)"/>

  <!-- Metallic sheen overlay -->
  <rect x="52" y="52" width="920" height="920" rx="196" fill="url(#bgShine)"/>

  <!-- Subtle inner border -->
  <rect x="52" y="52" width="920" height="920" rx="196" fill="none" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- ===== AMBIENT GLOW BEHIND MARK ===== -->
  <ellipse cx="510" cy="510" rx="260" ry="270" fill="#7c3aed" opacity="0.07" filter="url(#ambientGlow)"/>

  <!-- ===== S+F MARK ===== -->
  <g filter="url(#markGlow)">
    <!--
      F TOP CROSSBAR
      Extends left from the S's top-left connection point.
      Stroke: 88px for slight differentiation from S curves (96px).
    -->
    <path d="M 175 340 L 370 340"
          fill="none" stroke="url(#brandGradH)" stroke-width="88" stroke-linecap="round"/>

    <!--
      F MIDDLE CROSSBAR
      Extends left from the S's middle-left connection point.
      Shorter than top bar = classic F proportion.
    -->
    <path d="M 230 530 L 370 530"
          fill="none" stroke="url(#brandGradH)" stroke-width="88" stroke-linecap="round"/>

    <!--
      S TOP CURVE
      From left stem → arcs up-right → descends to right side.
      Creates the top half of the S.
    -->
    <path d="M 370 340 C 370 230, 690 240, 690 410"
          fill="none" stroke="url(#brandGrad)" stroke-width="96" stroke-linecap="round"/>

    <!--
      S MIDDLE CROSSING
      From right side → arcs left-down → connects back to left stem.
      The diagonal that gives the S its characteristic form.
    -->
    <path d="M 690 410 C 690 525, 370 500, 370 530"
          fill="none" stroke="url(#brandGrad)" stroke-width="96" stroke-linecap="round"/>

    <!--
      S BOTTOM CURVE
      From left stem → arcs right-down → terminal extends into the spark.
      The S's final flourish.
    -->
    <path d="M 370 530 C 370 645, 690 655, 690 745"
          fill="none" stroke="url(#brandGrad)" stroke-width="96" stroke-linecap="round"/>

    <!--
      SPARK / FORGE ELEMENT
      A sharp, geometric 2-point spark extending from the S terminal.
      Reads as a forge spark while remaining clean at small sizes.
    -->
    <path d="M 685 745
             L 795 715
             L 715 750
             L 815 790
             L 695 775
             Z"
          fill="url(#brandGrad)"/>
  </g>
</svg>
