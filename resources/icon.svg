<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Warm cream paper background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCFAF5"/>
      <stop offset="40%" stop-color="#F7F4ED"/>
      <stop offset="100%" stop-color="#EFEBE0"/>
    </linearGradient>

    <!-- Warm sunlight from top-center -->
    <radialGradient id="bgLight" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#FDF6F1" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#F5D3B8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EFEBE0" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner border — warm brown -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9D1C5" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C4BBAF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EBE5DA" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Brand gradient: cognac amber (forge fire) -->
    <linearGradient id="brandGrad" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#ECB090"/>
      <stop offset="30%" stop-color="#D06838"/>
      <stop offset="65%" stop-color="#B8522C"/>
      <stop offset="100%" stop-color="#7C311B"/>
    </linearGradient>

    <!-- Horizontal gradient for F crossbars -->
    <linearGradient id="brandGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ECB090"/>
      <stop offset="50%" stop-color="#D06838"/>
      <stop offset="100%" stop-color="#B8522C"/>
    </linearGradient>

    <!-- Spark gradient — bright forge spark -->
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF6F1"/>
      <stop offset="30%" stop-color="#F5D3B8"/>
      <stop offset="70%" stop-color="#E0885E"/>
      <stop offset="100%" stop-color="#9A3F22"/>
    </linearGradient>

    <!-- Warm ambient glow behind the mark -->
    <filter id="ambientGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <!-- Bloom filter for the mark -->
    <filter id="markHalo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Spark glow -->
    <filter id="sparkGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <!-- Main rounded square — warm cream paper -->
  <rect x="48" y="48" width="928" height="928" rx="200" fill="url(#bgGrad)"/>
  <!-- Sunlight overlay -->
  <rect x="48" y="48" width="928" height="928" rx="200" fill="url(#bgLight)"/>
  <!-- Inner border -->
  <rect x="48" y="48" width="928" height="928" rx="200" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- ===== AMBIENT GLOW ===== -->
  <ellipse cx="510" cy="520" rx="280" ry="280" fill="#D06838" opacity="0.05" filter="url(#ambientGlow)"/>
  <ellipse cx="510" cy="740" rx="180" ry="100" fill="#E0885E" opacity="0.03" filter="url(#ambientGlow)"/>

  <!-- ===== S+F MARK ===== -->
  <g filter="url(#markHalo)">
    <!-- F TOP CROSSBAR -->
    <path d="M 175 342 L 380 342"
          fill="none" stroke="url(#brandGradH)" stroke-width="80" stroke-linecap="round"/>

    <!-- F MIDDLE CROSSBAR -->
    <path d="M 235 528 L 380 528"
          fill="none" stroke="url(#brandGradH)" stroke-width="80" stroke-linecap="round"/>

    <!-- S TOP CURVE -->
    <path d="M 380 342 C 380 230, 700 235, 700 408"
          fill="none" stroke="url(#brandGrad)" stroke-width="92" stroke-linecap="round"/>

    <!-- S MIDDLE CROSSING -->
    <path d="M 700 408 C 700 520, 380 500, 380 528"
          fill="none" stroke="url(#brandGrad)" stroke-width="92" stroke-linecap="round"/>

    <!-- S BOTTOM CURVE -->
    <path d="M 380 528 C 380 640, 700 650, 700 745"
          fill="none" stroke="url(#brandGrad)" stroke-width="92" stroke-linecap="round"/>

    <!-- SPARK ELEMENT -->
    <g filter="url(#sparkGlow)">
      <path d="M 695 745
               L 805 712
               L 718 750
               L 820 790
               L 700 778
               Z"
            fill="url(#sparkGrad)" opacity="0.95"/>
    </g>
  </g>
</svg>
