<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: dark forge metal with subtle warmth -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b18"/>
      <stop offset="40%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#141110"/>
    </linearGradient>

    <!-- Warm ambient glow behind flame -->
    <radialGradient id="ambientGlow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Core flame glow for depth -->
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Right facet — warmer, brighter (light from forge) -->
    <linearGradient id="facetRight" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>

    <!-- Left facet — cooler, shadowed -->
    <linearGradient id="facetLeft" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Top facet — brightest, closest to spark point -->
    <linearGradient id="facetTop" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>

    <!-- Inner body facets -->
    <linearGradient id="facetInnerRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <linearGradient id="facetInnerLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Forge base / anvil line -->
    <linearGradient id="anvilLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle inner border glow -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <!-- Rounded square base -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bgGrad)"/>

  <!-- Ambient warm glow -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#ambientGlow)"/>

  <!-- Core glow behind flame -->
  <circle cx="512" cy="440" r="280" fill="url(#coreGlow)"/>

  <!-- === FORGE BASE LINES === -->
  <!-- Top anvil line -->
  <line x1="340" y1="630" x2="684" y2="630" stroke="url(#anvilLine)" stroke-width="2.5"/>
  <!-- Bottom anvil line -->
  <line x1="360" y1="650" x2="664" y2="650" stroke="url(#anvilLine)" stroke-width="1.5"/>

  <!-- === MAIN FLAME — FACETED GEOMETRIC SPARK === -->
  <!--
    Flame silhouette (8 outer points):
    Top:        (512, 160)    — flame tip
    UR-high:    (610, 310)
    UR-mid:     (680, 450)    — widest point right
    UR-low:     (610, 580)
    Bottom:     (512, 620)    — flame base
    UL-low:     (414, 580)
    UL-mid:     (344, 450)    — widest point left
    UL-high:    (414, 310)
  -->

  <!-- LEFT OUTER WING (shadow side) -->
  <polygon points="512,600  380,450  440,310  512,340"
           fill="url(#facetLeft)" opacity="0.85"/>

  <!-- RIGHT OUTER WING (light side) -->
  <polygon points="512,600  644,450  584,310  512,340"
           fill="url(#facetRight)" opacity="0.90"/>

  <!-- LEFT INNER BODY -->
  <polygon points="512,600  440,460  460,330  512,340"
           fill="url(#facetInnerLeft)" opacity="0.92"/>

  <!-- RIGHT INNER BODY -->
  <polygon points="512,600  584,460  564,330  512,340"
           fill="url(#facetInnerRight)" opacity="0.95"/>

  <!-- TOP FACET (brightest, the spark point) -->
  <polygon points="440,310  512,160  584,310  512,340"
           fill="url(#facetTop)" opacity="0.95"/>

  <!-- CENTER CORE (hottest point) -->
  <polygon points="470,440  512,270  554,440  512,520"
           fill="#fef3c7" opacity="0.20"/>

  <!-- Core bright ellipse -->
  <ellipse cx="512" cy="440" rx="28" ry="40" fill="#fef3c7" opacity="0.18"/>

  <!-- === SPARK PARTICLES === -->
  <!-- Top-right spark -->
  <circle cx="630" cy="220" r="7" fill="#fcd34d" opacity="0.55"/>
  <circle cx="634" cy="216" r="3" fill="#fef3c7" opacity="0.3"/>

  <!-- Top-left spark -->
  <circle cx="390" cy="240" r="5.5" fill="#fbbf24" opacity="0.50"/>
  <circle cx="393" cy="237" r="2.5" fill="#fef3c7" opacity="0.25"/>

  <!-- Far left spark -->
  <circle cx="340" cy="360" r="4.5" fill="#fbbf24" opacity="0.35"/>

  <!-- Far right spark -->
  <circle cx="690" cy="380" r="3.5" fill="#fcd34d" opacity="0.30"/>

  <!-- Upper mid spark -->
  <circle cx="570" cy="180" r="4" fill="#fef3c7" opacity="0.35"/>

  <!-- === SUBTLE INNER BORDER === -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200"
        fill="none" stroke="url(#borderGlow)" stroke-width="2"/>
</svg>
